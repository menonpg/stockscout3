name: Backtest

on:
  workflow_dispatch:
  push:
    paths:
      - 'stockscout3/backtest.py'
      - 'stockscout3/report.py'

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pandas numpy requests

      - name: Fetch data from stockscout-backtest
        env:
          PI_TOKEN: ${{ secrets.PI_WORKSPACE_TOKEN }}
        run: |
          git clone --depth=1 https://x-access-token:${PI_TOKEN}@github.com/menonpg/stockscout-backtest.git tmp-bt
          mkdir -p data
          cp tmp-bt/data/scored_history.json data/
          cp tmp-bt/data/ohlc_*.json data/
          cp tmp-bt/data/fund_*.json data/ 2>/dev/null || true
          cp tmp-bt/data/ohlc_\^VIX.json data/ 2>/dev/null || true
          echo "scored_history: $(wc -l < data/scored_history.json) lines"
          echo "ohlc files: $(ls data/ohlc_*.json | wc -l)"

      - name: Fetch Trump predictions
        run: |
          python3 -c "
          import requests, json
          r = requests.get('https://raw.githubusercontent.com/sstklen/trump-code/main/data/predictions_log.json', timeout=30)
          r.raise_for_status()
          json.dump(r.json(), open('data/trump_predictions.json','w'), indent=2)
          print(f'Fetched {len(r.json())} predictions')
          "

      - name: Run baseline (no regime gate)
        run: python3 -m stockscout3.backtest --mode equal --max-gap-pct 0.5 --out-suffix _sc3_baseline

      - name: Run with regime gate
        run: python3 -m stockscout3.backtest --mode equal --max-gap-pct 0.5 --regime --out-suffix _sc3_regime

      - name: Rename result files
        run: |
          cp data/results_equal_sc3_baseline.json data/backtest_baseline.json
          cp data/results_equal_sc3_regime.json   data/backtest_regime.json

      - name: Generate report
        run: python3 stockscout3/report.py

      - name: Generate dashboard
        run: |
          mkdir -p data/trades
          python3 stockscout3/dashboard.py

      - name: Publish to pi-workspace
        env:
          PI_TOKEN: ${{ secrets.PI_WORKSPACE_TOKEN }}
        run: |
          git clone --depth=1 https://x-access-token:${PI_TOKEN}@github.com/menonpg/pi-workspace.git tmp-pi
          mkdir -p tmp-pi/docs/stockscout3/backtest
          cp data/dashboard.html          tmp-pi/docs/stockscout3/index.html
          cp data/stockscout3_report.html tmp-pi/docs/stockscout3/backtest/index.html
          cp data/backtest_baseline.json  tmp-pi/docs/stockscout3/
          cp data/backtest_regime.json    tmp-pi/docs/stockscout3/
          cd tmp-pi
          git config user.name "stockscout3-bot"
          git config user.email "bot@themenonlab.com"
          git fetch origin main && git reset --hard FETCH_HEAD
          git add docs/stockscout3/
          git diff --cached --quiet || git commit -m "backtest: stockscout3 $(date -u +%Y-%m-%d)"
          git push https://x-access-token:${PI_TOKEN}@github.com/menonpg/pi-workspace.git HEAD:main
